<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub License Bulk Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #log {
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">GitHub License Bulk Editor</h1>

        <form id="editorForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">GitHub Personal Access Token</label>
                    <input type="password" id="token" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Organization (optional)</label>
                    <input type="text" id="org" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="e.g. google">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Old Year</label>
                    <input type="text" id="oldYear" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="2023">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">New Year</label>
                    <input type="text" id="newYear" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="2024">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Old Name</label>
                    <input type="text" id="oldName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">New Name</label>
                    <input type="text" id="newName" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2" placeholder="Jane Smith">
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <input type="checkbox" id="dryRun" checked class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                <label for="dryRun" class="text-sm text-gray-700 font-medium">Dry Run (don't push changes)</label>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition duration-200">
                Start Bulk Edit
            </button>
        </form>

        <div class="mt-8">
            <h2 class="text-lg font-semibold mb-2 text-gray-700">Activity Log</h2>
            <div id="log" class="bg-gray-900 text-green-400 p-4 rounded-lg h-64 overflow-y-auto text-sm">Waiting for input...</div>
        </div>
    </div>

    <script type="module">
        import { Octokit } from "https://esm.sh/@octokit/rest";

        const form = document.getElementById('editorForm');
        const logArea = document.getElementById('log');
        const submitBtn = document.getElementById('submitBtn');

        function log(message, type = 'info') {
            const div = document.createElement('div');
            const colors = {
                info: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400',
                success: 'text-blue-400'
            };
            div.className = colors[type] || 'text-green-400';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = document.getElementById('token').value;
            const org = document.getElementById('org').value;
            const oldYear = document.getElementById('oldYear').value;
            const newYear = document.getElementById('newYear').value;
            const oldName = document.getElementById('oldName').value;
            const newName = document.getElementById('newName').value;
            const dryRun = document.getElementById('dryRun').checked;

            if (!token) {
                log('Error: GitHub token is required.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            logArea.innerHTML = '';
            log('Starting process...');

            const octokit = new Octokit({ auth: token });

            try {
                log('Fetching repositories...');
                let repos = [];
                if (org) {
                    repos = await octokit.paginate(octokit.rest.repos.listForOrg, {
                        org: org,
                        type: "all",
                    });
                } else {
                    repos = await octokit.paginate(octokit.rest.repos.listForAuthenticatedUser, {
                        visibility: "all",
                    });
                }
                log(`Found ${repos.length} repositories.`, 'success');

                for (const repo of repos) {
                    await updateLicense(octokit, repo, { oldYear, newYear, oldName, newName, dryRun });
                }

                log('All done!', 'success');
            } catch (error) {
                log(`Critical Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        async function updateLicense(octokit, repo, options) {
            const { owner, name: repoName } = repo;
            const possibleLicenseFiles = ["LICENSE", "LICENSE.md", "LICENSE.txt", "license", "license.md", "license.txt"];

            let licenseFile = null;
            let content = null;
            let sha = null;

            for (const file of possibleLicenseFiles) {
                try {
                    const response = await octokit.rest.repos.getContent({
                        owner: owner.login,
                        repo: repoName,
                        path: file,
                    });

                    if (response.data && !Array.isArray(response.data)) {
                        licenseFile = file;
                        content = decodeURIComponent(escape(atob(response.data.content.replace(/\s/g, ''))));
                        sha = response.data.sha;
                        break;
                    }
                } catch (error) {
                    if (error.status !== 404) {
                        throw error;
                    }
                }
            }

            if (!licenseFile) {
                log(`Skipping ${owner.login}/${repoName}: No license file found.`, 'warning');
                return;
            }

            let newContent = content;
            let changed = false;

            if (options.oldYear && options.newYear) {
                const yearRegex = new RegExp(options.oldYear, 'g');
                if (yearRegex.test(newContent)) {
                    newContent = newContent.replace(yearRegex, options.newYear);
                    changed = true;
                }
            }

            if (options.oldName && options.newName) {
                const nameRegex = new RegExp(options.oldName, 'g');
                if (nameRegex.test(newContent)) {
                    newContent = newContent.replace(nameRegex, options.newName);
                    changed = true;
                }
            }

            if (changed) {
                if (options.dryRun) {
                    log(`[DRY RUN] Would update license in ${owner.login}/${repoName}`, 'info');
                } else {
                    try {
                        await octokit.rest.repos.createOrUpdateFileContents({
                            owner: owner.login,
                            repo: repoName,
                            path: licenseFile,
                            message: "docs: update license year/name",
                            content: btoa(unescape(encodeURIComponent(newContent))),
                            sha: sha,
                        });
                        log(`Updated license in ${owner.login}/${repoName}`, 'success');
                    } catch (error) {
                        log(`Error updating ${owner.login}/${repoName}: ${error.message}`, 'error');
                    }
                }
            } else {
                log(`No changes needed for ${owner.login}/${repoName}`);
            }
        }
    </script>
</body>
</html>
