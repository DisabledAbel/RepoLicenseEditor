<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub License Bulk Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'media'
        }
    </script>
    <style>
        #log {
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen p-8 transition-colors duration-200">
    <div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 border dark:border-gray-700 transition-colors duration-200">
        <h1 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">GitHub License Bulk Editor</h1>

        <form id="editorForm" class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">GitHub Personal Access Token</label>
                    <input type="password" id="token" required class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white" placeholder="ghp_xxxxxxxxxxxx">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Organization (optional)</label>
                    <div class="flex space-x-2">
                        <input type="text" id="org" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white" placeholder="e.g. google">
                        <button type="button" id="fetchReposBtn" class="mt-1 bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700 transition duration-200">Fetch</button>
                    </div>
                </div>
            </div>

            <div id="repoSelection" class="hidden space-y-4 border dark:border-gray-700 p-4 rounded-md">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <h3 class="text-md font-semibold text-gray-800 dark:text-white">Select Repositories</h3>
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="flex items-center space-x-1">
                            <input type="checkbox" id="selectAll" class="h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700">
                            <label for="selectAll" class="text-sm text-gray-700 dark:text-gray-300">Select All</label>
                        </div>
                        <input type="text" id="repoSearch" class="border border-gray-300 dark:border-gray-600 rounded-md p-1 text-sm dark:bg-gray-700 dark:text-white" placeholder="Search by name...">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-2 text-xs">
                    <div>
                        <label class="block text-gray-600 dark:text-gray-400">Sort By</label>
                        <select id="sortBy" class="w-full border border-gray-300 dark:border-gray-600 rounded p-1 dark:bg-gray-700 dark:text-white">
                            <option value="name">Name</option>
                            <option value="pushed_at">Last Updated</option>
                            <option value="stargazers_count">Stars</option>
                            <option value="size">Size</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 dark:text-gray-400">Filter License</label>
                        <select id="filterLicense" class="w-full border border-gray-300 dark:border-gray-600 rounded p-1 dark:bg-gray-700 dark:text-white">
                            <option value="">All</option>
                            <option value="none">No License</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-600 dark:text-gray-400">Filter Branch</label>
                        <select id="filterBranch" class="w-full border border-gray-300 dark:border-gray-600 rounded p-1 dark:bg-gray-700 dark:text-white">
                            <option value="">All</option>
                        </select>
                    </div>
                </div>

                <div id="repoList" class="grid grid-cols-1 gap-2 max-h-64 overflow-y-auto p-2 border dark:border-gray-700 rounded bg-gray-50 dark:bg-gray-900">
                    <!-- Repositories will be injected here -->
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Old Year</label>
                    <input type="text" id="oldYear" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white" placeholder="2023">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">New Year</label>
                    <input type="text" id="newYear" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white" placeholder="2024">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Old Name</label>
                    <input type="text" id="oldName" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">New Name</label>
                    <input type="text" id="newName" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white" placeholder="Jane Smith">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Change License Template (optional)</label>
                <div class="flex space-x-2">
                    <select id="licenseSelect" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white">
                        <option value="">Keep current license</option>
                        <option value="custom">Custom Template...</option>
                        <!-- Licenses will be injected here -->
                    </select>
                    <button type="button" id="compareTemplatesBtn" class="mt-1 bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700 transition duration-200 whitespace-nowrap">
                        Compare
                    </button>
                </div>
            </div>

            <div id="customLicenseContainer" class="hidden">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">Custom License Template</label>
                <p class="text-xs text-gray-500 mb-1">Use [year] and [fullname] as placeholders.</p>
                <textarea id="customLicense" rows="8" class="mt-1 block w-full border border-gray-300 dark:border-gray-600 rounded-md shadow-sm p-2 dark:bg-gray-700 dark:text-white font-mono text-sm" placeholder="MIT License..."></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button type="button" id="verifyBtn" class="bg-gray-600 text-white font-bold py-2 px-4 rounded hover:bg-gray-700 transition duration-200">
                    Verify All Integrity
                </button>
                <button type="submit" id="submitBtn" class="bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 transition duration-200">
                    Start Bulk Edit
                </button>
            </div>
        </form>

        <div class="mt-8">
            <h2 class="text-lg font-semibold mb-2 text-gray-700 dark:text-white">Activity Log</h2>
            <div id="log" class="bg-gray-900 text-green-400 p-4 rounded-lg h-64 overflow-y-auto text-sm border dark:border-gray-700">Waiting for input...</div>
        </div>
    </div>

    <!-- Comparison Modal -->
    <div id="compareModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-6xl max-h-[90vh] flex flex-col border dark:border-gray-700">
            <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
                <h3 class="text-xl font-bold text-gray-800 dark:text-white">Compare Licenses</h3>
                <button id="closeCompareModal" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-2xl">&times;</button>
            </div>

            <div class="p-4 grid grid-cols-2 gap-4 flex-grow overflow-hidden">
                <div class="flex flex-col space-y-2 h-full">
                    <select id="compareLeftSelect" class="w-full border border-gray-300 dark:border-gray-600 rounded p-2 dark:bg-gray-700 dark:text-white">
                        <option value="">Select License A...</option>
                    </select>
                    <div id="compareLeftContent" class="flex-grow overflow-auto p-4 bg-gray-50 dark:bg-gray-900 rounded border dark:border-gray-700 font-mono text-sm whitespace-pre-wrap dark:text-gray-300"></div>
                </div>
                <div class="flex flex-col space-y-2 h-full">
                    <select id="compareRightSelect" class="w-full border border-gray-300 dark:border-gray-600 rounded p-2 dark:bg-gray-700 dark:text-white">
                        <option value="">Select License B...</option>
                    </select>
                    <div id="compareRightContent" class="flex-grow overflow-auto p-4 bg-gray-50 dark:bg-gray-900 rounded border dark:border-gray-700 font-mono text-sm whitespace-pre-wrap dark:text-gray-300"></div>
                </div>
            </div>

            <div class="p-4 border-t dark:border-gray-700 flex justify-end">
                <button id="closeCompareBtn" class="bg-gray-600 text-white font-bold py-2 px-6 rounded hover:bg-gray-700 transition duration-200">Close</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { Octokit } from "https://esm.sh/@octokit/rest";
        import * as jsdiff from "https://esm.sh/diff";
        import { replaceLogic, checkLicenseIntegrity } from "./logic.js";
        import { TEMPLATES } from "./templates.js";

        const form = document.getElementById('editorForm');
        const logArea = document.getElementById('log');
        const submitBtn = document.getElementById('submitBtn');
        const fetchReposBtn = document.getElementById('fetchReposBtn');
        const repoSelection = document.getElementById('repoSelection');
        const repoList = document.getElementById('repoList');
        const repoSearch = document.getElementById('repoSearch');
        const selectAll = document.getElementById('selectAll');
        const licenseSelect = document.getElementById('licenseSelect');
        const customLicenseContainer = document.getElementById('customLicenseContainer');
        const customLicense = document.getElementById('customLicense');
        const verifyBtn = document.getElementById('verifyBtn');
        const sortBy = document.getElementById('sortBy');
        const filterLicense = document.getElementById('filterLicense');
        const filterBranch = document.getElementById('filterBranch');
        const compareModal = document.getElementById('compareModal');
        const closeCompareModal = document.getElementById('closeCompareModal');
        const closeCompareBtn = document.getElementById('closeCompareBtn');
        const compareLeftSelect = document.getElementById('compareLeftSelect');
        const compareRightSelect = document.getElementById('compareRightSelect');
        const compareLeftContent = document.getElementById('compareLeftContent');
        const compareRightContent = document.getElementById('compareRightContent');
        const compareTemplatesBtn = document.getElementById('compareTemplatesBtn');

        let allFetchedRepos = [];
        let selectedRepoIds = new Set();
        let cachedTemplates = { ...Object.fromEntries(Object.entries(TEMPLATES).map(([k, v]) => [k, v.body])) };

        function clearRepoState() {
            allFetchedRepos = [];
            selectedRepoIds = new Set();
            repoSelection.classList.add('hidden');
            repoList.innerHTML = '';
        }

        function populateLicenseSelect() {
            licenseSelect.innerHTML = `
                <option value="">Keep current license</option>
                <option value="custom">Custom Template...</option>
            `;
            Object.keys(TEMPLATES).forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = TEMPLATES[key].name;
                licenseSelect.appendChild(option);
            });
            populateCompareSelects();
        }

        populateLicenseSelect();

        let fetchTimeout;
        async function fetchLicenses() {
            const token = document.getElementById('token').value;
            if (!token) return;
            const octokit = new Octokit({ auth: token });
            try {
                const { data } = await octokit.rest.licenses.getAllCommonlyUsed();

                // Merge with bundled if any new ones found
                data.forEach(license => {
                    if (!TEMPLATES[license.key]) {
                        const option = document.createElement('option');
                        option.value = license.key;
                        option.textContent = license.name;
                        licenseSelect.appendChild(option);
                    }
                });
                populateCompareSelects(data);
            } catch (error) {
                console.error('Error fetching licenses:', error);
            }
        }

        document.getElementById('token').addEventListener('input', () => {
            clearRepoState();
            clearTimeout(fetchTimeout);
            fetchTimeout = setTimeout(fetchLicenses, 500);
        });
        document.getElementById('org').addEventListener('input', clearRepoState);

        function log(message, type = 'info') {
            const div = document.createElement('div');
            const colors = {
                info: 'text-green-400',
                error: 'text-red-400',
                warning: 'text-yellow-400',
                success: 'text-blue-400'
            };
            div.className = colors[type] || 'text-green-400';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        fetchReposBtn.addEventListener('click', async () => {
            const token = document.getElementById('token').value;
            const org = document.getElementById('org').value;

            if (!token) {
                log('Error: GitHub token is required to fetch repositories.', 'error');
                return;
            }

            fetchReposBtn.disabled = true;
            fetchReposBtn.textContent = 'Fetching...';
            const octokit = new Octokit({ auth: token });

            try {
                log('Fetching repositories...');
                if (org) {
                    allFetchedRepos = await octokit.paginate(octokit.rest.repos.listForOrg, {
                        org: org,
                        type: "all",
                    });
                } else {
                    allFetchedRepos = await octokit.paginate(octokit.rest.repos.listForAuthenticatedUser, {
                        visibility: "all",
                    });
                }
                log(`Found ${allFetchedRepos.length} repositories.`, 'success');
                selectedRepoIds = new Set(allFetchedRepos.map(r => r.id));
                selectAll.checked = true;
                populateFilters();
                renderRepoList();
                repoSelection.classList.remove('hidden');

                // Refresh comparison selects with new repos
                const { data: licenses } = await octokit.rest.licenses.getAllCommonlyUsed();
                populateCompareSelects(licenses);
            } catch (error) {
                log(`Error fetching repositories: ${error.message}`, 'error');
            } finally {
                fetchReposBtn.disabled = false;
                fetchReposBtn.textContent = 'Fetch';
            }
        });

        function populateCompareSelects(extraLicenses = []) {
            const selects = [compareLeftSelect, compareRightSelect];
            selects.forEach(select => {
                select.innerHTML = '<option value="">Select License...</option>';
                const customOpt = document.createElement('option');
                customOpt.value = 'custom';
                customOpt.textContent = 'Custom Template';
                select.appendChild(customOpt);

                Object.keys(TEMPLATES).forEach(key => {
                    const opt = document.createElement('option');
                    opt.value = `template:${key}`;
                    opt.textContent = `Template: ${TEMPLATES[key].name}`;
                    select.appendChild(opt);
                });

                extraLicenses.forEach(l => {
                    if (!TEMPLATES[l.key]) {
                        const opt = document.createElement('option');
                        opt.value = `template:${l.key}`;
                        opt.textContent = `Template: ${l.name}`;
                        select.appendChild(opt);
                    }
                });

                allFetchedRepos.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = `repo:${r.id}`;
                    opt.textContent = `Repo: ${r.name}`;
                    select.appendChild(opt);
                });
            });
        }

        function populateFilters() {
            const licenses = new Set();
            const branches = new Set();
            allFetchedRepos.forEach(repo => {
                if (repo.license) licenses.add(repo.license.name);
                if (repo.default_branch) branches.add(repo.default_branch);
            });

            filterLicense.innerHTML = '<option value="">All Licenses</option><option value="none">No License</option>';
            Array.from(licenses).sort().forEach(l => {
                const opt = document.createElement('option');
                opt.value = l;
                opt.textContent = l;
                filterLicense.appendChild(opt);
            });

            filterBranch.innerHTML = '<option value="">All Branches</option>';
            Array.from(branches).sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                filterBranch.appendChild(opt);
            });
        }

        function renderRepoList() {
            const searchText = repoSearch.value.toLowerCase();
            const licenseFilter = filterLicense.value;
            const branchFilter = filterBranch.value;
            const sortVal = sortBy.value;

            let filtered = allFetchedRepos.filter(repo => {
                const matchesSearch = repo.name.toLowerCase().includes(searchText);
                const matchesLicense = !licenseFilter ||
                                       (licenseFilter === 'none' ? !repo.license : (repo.license && repo.license.name === licenseFilter));
                const matchesBranch = !branchFilter || repo.default_branch === branchFilter;
                return matchesSearch && matchesLicense && matchesBranch;
            });

            filtered.sort((a, b) => {
                let valA = a[sortVal];
                let valB = b[sortVal];

                if (sortVal === 'name') {
                    return valA.localeCompare(valB);
                }

                // For pushed_at, stargazers_count, size - descending order usually better for stars/date
                if (sortVal === 'stargazers_count' || sortVal === 'size' || sortVal === 'pushed_at') {
                    if (valA < valB) return 1;
                    if (valA > valB) return -1;
                    return 0;
                }
                return 0;
            });

            repoList.innerHTML = '';
            filtered.forEach(repo => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-2 border-b dark:border-gray-700 last:border-0 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-150';

                const leftSide = document.createElement('div');
                leftSide.className = 'flex items-center space-x-3';

                const isChecked = selectedRepoIds.has(repo.id);
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `repo-${repo.id}`;
                checkbox.className = 'h-4 w-4 text-blue-600 border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700';
                checkbox.checked = isChecked;
                checkbox.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        selectedRepoIds.add(repo.id);
                    } else {
                        selectedRepoIds.delete(repo.id);
                        selectAll.checked = false;
                    }
                });

                const label = document.createElement('label');
                label.htmlFor = `repo-${repo.id}`;
                label.className = 'text-sm font-medium text-gray-700 dark:text-gray-300 cursor-pointer';
                label.textContent = repo.name;

                leftSide.appendChild(checkbox);
                leftSide.appendChild(label);

                const rightSide = document.createElement('div');
                rightSide.className = 'flex items-center space-x-4 text-xs text-gray-500 dark:text-gray-400';

                const stars = document.createElement('span');
                stars.textContent = `⭐ ${repo.stargazers_count}`;

                const license = document.createElement('span');
                license.className = 'italic flex items-center space-x-1';
                license.textContent = repo.license ? repo.license.spdx_id || repo.license.name : 'No License';

                if (repo.license && repo.license.key) {
                    const integrityBadge = document.createElement('span');
                    integrityBadge.className = 'ml-1 px-1.5 py-0.5 rounded text-[10px] font-bold uppercase';
                    integrityBadge.id = `integrity-${repo.id}`;
                    integrityBadge.textContent = repo.integrity || '...';
                    if (repo.integrity === 'standard') {
                        integrityBadge.classList.add('bg-green-200', 'text-green-700');
                    } else if (repo.integrity === 'modified') {
                        integrityBadge.classList.add('bg-red-200', 'text-red-700');
                    } else {
                        integrityBadge.classList.add('bg-gray-200', 'text-gray-600');
                    }
                    license.appendChild(integrityBadge);
                }

                const branch = document.createElement('span');
                branch.className = 'bg-gray-200 dark:bg-gray-700 px-1 rounded';
                branch.textContent = repo.default_branch;

                const compareBtn = document.createElement('button');
                compareBtn.type = 'button';
                compareBtn.className = 'text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 ml-2 p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700 transition duration-150';
                compareBtn.title = 'Compare with selected template';
                compareBtn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                    </svg>
                `;
                compareBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openCompareWithRepo(repo);
                });

                rightSide.appendChild(stars);
                rightSide.appendChild(license);
                rightSide.appendChild(branch);
                rightSide.appendChild(compareBtn);

                div.appendChild(leftSide);
                div.appendChild(rightSide);
                repoList.appendChild(div);
            });
        }

        repoSearch.addEventListener('input', renderRepoList);
        sortBy.addEventListener('change', renderRepoList);
        filterLicense.addEventListener('change', renderRepoList);
        filterBranch.addEventListener('change', renderRepoList);

        async function getRepoLicenseContent(repo) {
            const token = document.getElementById('token').value;
            if (!token) return "";
            const octokit = new Octokit({ auth: token });
            const possibleFiles = ["LICENSE", "LICENSE.md", "LICENSE.txt", "license", "license.md", "license.txt"];
            for (const file of possibleFiles) {
                try {
                    const resp = await octokit.rest.repos.getContent({
                        owner: repo.owner.login,
                        repo: repo.name,
                        path: file
                    });
                    if (resp.data && !Array.isArray(resp.data)) {
                        return decodeURIComponent(escape(atob(resp.data.content.replace(/\s/g, ''))));
                    }
                } catch (e) {
                    if (e.status !== 404) throw e;
                }
            }
            return "";
        }

        async function fetchIntegrity(repo) {
            const token = document.getElementById('token').value;
            const badge = document.getElementById(`integrity-${repo.id}`);
            if (!token || !badge || repo.integrity) return;

            const octokit = new Octokit({ auth: token });
            try {
                const content = await getRepoLicenseContent(repo);

                if (!content) {
                    badge.textContent = 'NO FILE';
                    return;
                }

                const templateResp = await octokit.rest.licenses.get({ license: repo.license.key });
                const status = checkLicenseIntegrity(content, templateResp.data.body);

                repo.integrity = status;
                badge.textContent = status;
                if (status === 'standard') {
                    badge.classList.replace('bg-gray-200', 'bg-green-200');
                    badge.classList.replace('text-gray-600', 'text-green-700');
                } else if (status === 'modified') {
                    badge.classList.replace('bg-gray-200', 'bg-red-200');
                    badge.classList.replace('text-gray-600', 'text-red-700');
                }
            } catch (e) {
                badge.textContent = 'ERR';
            }
        }

        verifyBtn.addEventListener('click', async () => {
            log('Starting integrity verification for all fetched repositories...');
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';
            for (const repo of allFetchedRepos) {
                if (repo.license && repo.license.key) {
                    await fetchIntegrity(repo);
                }
            }
            log('Integrity verification complete.', 'success');
            verifyBtn.disabled = false;
            verifyBtn.textContent = 'Verify All Integrity';
        });

        licenseSelect.addEventListener('change', () => {
            if (licenseSelect.value === 'custom') {
                customLicenseContainer.classList.remove('hidden');
            } else {
                customLicenseContainer.classList.add('hidden');
            }
        });

        // Comparison Modal Logic
        function closeCompare() {
            compareModal.classList.add('hidden');
        }
        closeCompareModal.addEventListener('click', closeCompare);
        closeCompareBtn.addEventListener('click', closeCompare);

        async function getLicenseContent(val) {
            if (!val) return "";
            const token = document.getElementById('token').value;
            if (val === 'custom') return customLicense.value;
            if (val.startsWith('template:')) {
                const key = val.split(':')[1];
                if (cachedTemplates[key]) return cachedTemplates[key];
                if (!token) return "Token required to fetch template body.";
                const octokit = new Octokit({ auth: token });
                const { data } = await octokit.rest.licenses.get({ license: key });
                cachedTemplates[key] = data.body;
                return data.body;
            }
            if (val.startsWith('repo:')) {
                const id = parseInt(val.split(':')[1]);
                const repo = allFetchedRepos.find(r => r.id === id);
                if (!repo) return "Repo not found.";
                return await getRepoLicenseContent(repo);
            }
            return "";
        }

        async function renderDiff() {
            try {
                const leftVal = compareLeftSelect.value;
                const rightVal = compareRightSelect.value;

                compareLeftContent.textContent = 'Loading...';
                compareRightContent.textContent = 'Loading...';

                const leftContent = await getLicenseContent(leftVal);
                const rightContent = await getLicenseContent(rightVal);

                compareLeftContent.innerHTML = '';
                compareRightContent.innerHTML = '';

                const diff = jsdiff.diffLines(leftContent, rightContent);

                diff.forEach((part) => {
                    const colorClass = part.added ? 'bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200' :
                                    part.removed ? 'bg-red-100 dark:bg-red-900 text-red-800 dark:text-red-200' : '';

                    const div = document.createElement('div');
                    if (colorClass) div.className = colorClass;
                    div.textContent = part.value;

                    if (part.added) {
                        // Added to right, so we need a placeholder in left
                        const lines = part.value.split('\n').length - 1;
                        const placeholder = document.createElement('div');
                        placeholder.className = 'bg-gray-100 dark:bg-gray-800 opacity-50';
                        placeholder.textContent = '\n'.repeat(lines);
                        compareLeftContent.appendChild(placeholder);
                        compareRightContent.appendChild(div);
                    } else if (part.removed) {
                        // Removed from left, so we need a placeholder in right
                        const lines = part.value.split('\n').length - 1;
                        const placeholder = document.createElement('div');
                        placeholder.className = 'bg-gray-100 dark:bg-gray-800 opacity-50';
                        placeholder.textContent = '\n'.repeat(lines);
                        compareLeftContent.appendChild(div);
                        compareRightContent.appendChild(placeholder);
                    } else {
                        compareLeftContent.appendChild(div.cloneNode(true));
                        compareRightContent.appendChild(div);
                    }
                });
            } catch (error) {
                compareLeftContent.textContent = 'Error: ' + error.message;
                compareRightContent.textContent = 'Error: ' + error.message;
            }
        }

        compareLeftSelect.addEventListener('change', renderDiff);
        compareRightSelect.addEventListener('change', renderDiff);

        compareTemplatesBtn.addEventListener('click', () => {
            const selected = licenseSelect.value;
            if (selected) {
                compareLeftSelect.value = selected === 'custom' ? 'custom' : `template:${selected}`;
            }
            compareModal.classList.remove('hidden');
            renderDiff();
        });

        window.openCompareWithRepo = async (repo) => {
            compareLeftSelect.value = `repo:${repo.id}`;
            const selected = licenseSelect.value;
            if (selected) {
                compareRightSelect.value = selected === 'custom' ? 'custom' : `template:${selected}`;
            }
            compareModal.classList.remove('hidden');
            renderDiff();
        };

        selectAll.addEventListener('change', () => {
            const filter = repoSearch.value.toLowerCase();
            allFetchedRepos.forEach(repo => {
                if (repo.name.toLowerCase().includes(filter)) {
                    if (selectAll.checked) {
                        selectedRepoIds.add(repo.id);
                    } else {
                        selectedRepoIds.delete(repo.id);
                    }
                }
            });
            renderRepoList();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const token = document.getElementById('token').value;
            const org = document.getElementById('org').value;
            const oldYear = document.getElementById('oldYear').value;
            const newYear = document.getElementById('newYear').value;
            const oldName = document.getElementById('oldName').value;
            const newName = document.getElementById('newName').value;
            const selectedLicense = licenseSelect.value;
            const customTemplate = customLicense.value;

            if (!token) {
                log('Error: GitHub token is required.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            logArea.innerHTML = '';
            log('Starting process...');

            const octokit = new Octokit({ auth: token });

            try {
                let reposToProcess = [];
                if (allFetchedRepos.length > 0) {
                    reposToProcess = allFetchedRepos.filter(repo => selectedRepoIds.has(repo.id));
                    if (reposToProcess.length === 0) {
                        log('No repositories selected to process.', 'warning');
                        submitBtn.disabled = false;
                        submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        return;
                    }
                } else {
                    log('Fetching repositories...');
                    if (org) {
                        reposToProcess = await octokit.paginate(octokit.rest.repos.listForOrg, {
                            org: org,
                            type: "all",
                        });
                    } else {
                        reposToProcess = await octokit.paginate(octokit.rest.repos.listForAuthenticatedUser, {
                            visibility: "all",
                        });
                    }
                }

                let licenseTemplateBody = null;
                if (selectedLicense) {
                    if (selectedLicense === 'custom') {
                        licenseTemplateBody = customTemplate;
                        if (!licenseTemplateBody) {
                             log('Error: Custom template is empty.', 'error');
                             submitBtn.disabled = false;
                             submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                             return;
                        }
                    } else {
                        const { data: licenseTemplate } = await octokit.rest.licenses.get({ license: selectedLicense });
                        licenseTemplateBody = licenseTemplate.body;
                    }
                }

                log(`Processing ${reposToProcess.length} repositories.`, 'info');

                for (const repo of reposToProcess) {
                    await updateLicense(octokit, repo, { oldYear, newYear, oldName, newName, selectedLicense, licenseTemplateBody });
                }

                log('All done!', 'success');
            } catch (error) {
                log(`Critical Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        async function updateLicense(octokit, repo, options) {
            const { owner, name: repoName } = repo;
            const possibleLicenseFiles = ["LICENSE", "LICENSE.md", "LICENSE.txt", "license", "license.md", "license.txt"];

            let licenseFile = null;
            let content = null;
            let sha = null;

            for (const file of possibleLicenseFiles) {
                try {
                    const response = await octokit.rest.repos.getContent({
                        owner: owner.login,
                        repo: repoName,
                        path: file,
                    });

                    if (response.data && !Array.isArray(response.data)) {
                        licenseFile = file;
                        content = decodeURIComponent(escape(atob(response.data.content.replace(/\s/g, ''))));
                        sha = response.data.sha;
                        break;
                    }
                } catch (error) {
                    if (error.status !== 404) {
                        throw error;
                    }
                }
            }

            if (options.licenseTemplateBody) {
                if (repo.license) {
                    if (options.selectedLicense === 'custom') {
                        log(`Warning: Repository ${repoName} already has a license (${repo.license.name}). Overwriting with custom template.`, 'warning');
                    } else if (repo.license.key !== options.selectedLicense) {
                        log(`Warning: Repository ${repoName} already has a different license (${repo.license.name}).`, 'warning');
                    }
                }
                if (!licenseFile) {
                    licenseFile = "LICENSE";
                }
            } else if (!licenseFile) {
                log(`Skipping ${owner.login}/${repoName}: No license file found.`, 'warning');
                return;
            }

            const { newContent, changed, message, remainingPlaceholders } = replaceLogic(content || "", options);

            if (remainingPlaceholders && remainingPlaceholders.length > 0) {
                log(`Warning: [${owner.login}/${repoName}] Unreplaced placeholders: ${remainingPlaceholders.join(', ')}`, 'warning');
            }

            if (changed) {
                try {
                    const payload = {
                        owner: owner.login,
                        repo: repoName,
                        path: licenseFile,
                        message: message,
                        content: btoa(unescape(encodeURIComponent(newContent))),
                    };
                    if (sha) payload.sha = sha;

                    await octokit.rest.repos.createOrUpdateFileContents(payload);
                    log(`Updated license in ${owner.login}/${repoName}`, 'success');
                } catch (error) {
                    log(`Error updating ${owner.login}/${repoName}: ${error.message}`, 'error');
                }
            } else {
                log(`No changes needed for ${owner.login}/${repoName}`);
            }
        }
    </script>
